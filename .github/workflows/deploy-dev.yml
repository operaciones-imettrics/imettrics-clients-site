name: Deploy to Firebase Hosting and Cloud Run (Development)

on:
  push:
    branches:
      - develop

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Install dependencies (Frontend)
        run: npm ci
        
      - name: Build frontend
        run: npm run build
        
      - name: Install Firebase CLI
        run: npm install -g firebase-tools
        
      - name: Deploy to Firebase Hosting (DEV)
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
        run: firebase deploy --only hosting,firestore,storage --project imettrics-clients-portal-dev --non-interactive

      # GCP Cloud Run Backend Deployment
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: '${{ secrets.GCP_SA_KEY_DEV }}'

      - name: Configure Docker
        run: gcloud auth configure-docker us-central1-docker.pkg.dev

      - name: Build and Push Docker image
        run: |
          cd backend
          docker build -t us-central1-docker.pkg.dev/imettrics-clients-portal-dev/cloud-run-images/imettrics-backend:latest .
          docker push us-central1-docker.pkg.dev/imettrics-clients-portal-dev/cloud-run-images/imettrics-backend:latest

      - name: Deploy to Cloud Run (DEV)
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: imettrics-backend
          image: us-central1-docker.pkg.dev/imettrics-clients-portal-dev/cloud-run-images/imettrics-backend:latest
          region: us-central1
          env_vars: |
            NODE_ENV=development
